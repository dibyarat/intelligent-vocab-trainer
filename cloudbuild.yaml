# cloudbuild.yaml
# Google Cloud Build CI/CD pipeline for Vocab Trainer
# Triggers on push to main branch: Build → Push → Deploy to Cloud Run

substitutions:
  _REGION: europe-west1
  _SERVICE_NAME: vocab-trainer-backend
  _FRONTEND_SERVICE: vocab-trainer-frontend
  _IMAGE_NAME: gcr.io/$PROJECT_ID/vocab-trainer-backend

steps:
  # ──────────────────────────────────────────────────────────────────────────
  # STEP 1: Run backend unit tests
  # ──────────────────────────────────────────────────────────────────────────
  - name: 'node:20-alpine'
    id: 'backend-test'
    dir: 'backend'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm ci
        npm test -- --passWithNoTests
    env:
      - 'NODE_ENV=test'

  # ──────────────────────────────────────────────────────────────────────────
  # STEP 2: Build backend Docker image
  # ──────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'backend-build'
    dir: 'backend'
    args:
      - 'build'
      - '--tag'
      - '${_IMAGE_NAME}:$SHORT_SHA'
      - '--tag'
      - '${_IMAGE_NAME}:latest'
      - '--cache-from'
      - '${_IMAGE_NAME}:latest'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '.'
    waitFor: ['backend-test']

  # ──────────────────────────────────────────────────────────────────────────
  # STEP 3: Push backend image to Container Registry
  # ──────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'backend-push'
    args:
      - 'push'
      - '--all-tags'
      - '${_IMAGE_NAME}'
    waitFor: ['backend-build']

  # ──────────────────────────────────────────────────────────────────────────
  # STEP 4: Deploy backend to Cloud Run
  # ──────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'backend-deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_IMAGE_NAME}:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '60s'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--set-secrets'
      - 'JWT_SECRET=vocab-trainer-jwt-secret:latest,FIREBASE_PROJECT_ID=vocab-trainer-firebase-project:latest,FIREBASE_CLIENT_EMAIL=vocab-trainer-firebase-email:latest,FIREBASE_PRIVATE_KEY=vocab-trainer-firebase-key:latest'
    waitFor: ['backend-push']

  # ──────────────────────────────────────────────────────────────────────────
  # STEP 5: Build frontend Docker image
  # ──────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'frontend-build'
    dir: 'frontend'
    args:
      - 'build'
      - '--tag'
      - 'gcr.io/$PROJECT_ID/vocab-trainer-frontend:$SHORT_SHA'
      - '--tag'
      - 'gcr.io/$PROJECT_ID/vocab-trainer-frontend:latest'
      - '.'
    waitFor: ['backend-test'] # Run in parallel with backend build

  # ──────────────────────────────────────────────────────────────────────────
  # STEP 6: Push and deploy frontend
  # ──────────────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'frontend-push'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/vocab-trainer-frontend'
    waitFor: ['frontend-build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'frontend-deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_SERVICE}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/vocab-trainer-frontend:$SHORT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
    waitFor: ['frontend-push']

# Store built images in Cloud Build artifact registry
images:
  - '${_IMAGE_NAME}:$SHORT_SHA'
  - '${_IMAGE_NAME}:latest'
  - 'gcr.io/$PROJECT_ID/vocab-trainer-frontend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/vocab-trainer-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  dynamic_substitutions: true

timeout: '1200s' # 20-minute build timeout
